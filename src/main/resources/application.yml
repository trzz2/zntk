server:
  port: 8080

spring:
  application:
    name: zntk
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zntk?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root


  data:
    redis:
      host: localhost
      port: 6379
      database: 0

jwt:
  secret: ${JWT_SECRET:zntk-dev-secret-change-before-deploy-2026}
  expire-minutes: 1440

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true
  setting:
    language: zh_cn

